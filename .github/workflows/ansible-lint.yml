name: Ansible CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint and Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install ansible ansible-lint yamllint

      - name: Run yamllint
        run: |
          yamllint .

      - name: Check Ansible syntax
        run: |
          ansible-playbook playbooks/facts.yml --syntax-check -i localhost,
          ansible-playbook playbooks/update-all.yml --syntax-check -i localhost,
          ansible-playbook playbooks/apply-base.yml --syntax-check -i localhost,

      - name: Run ansible-lint
        run: |
          ansible-lint playbooks/
